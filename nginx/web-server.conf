# ─────────────────────────────────────────────────────────────────
# Nginx reverse-proxy config for Web01 and Web02
# Place this file at: /etc/nginx/sites-available/tuto-archive
# Then: sudo ln -s /etc/nginx/sites-available/tuto-archive /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;   # replace _ with your server's IP or domain if needed

    # Forward all requests to the Node.js app running on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
