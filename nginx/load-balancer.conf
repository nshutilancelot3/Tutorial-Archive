# ─────────────────────────────────────────────────────────────────
# HAProxy load-balancer config for Lb01 (13.220.156.66)
# Location on server: /etc/haproxy/haproxy.cfg
#
# HAProxy was pre-installed on the ALU load balancer server.
# This file documents the active configuration.
# ─────────────────────────────────────────────────────────────────

global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Redirect all HTTP traffic to HTTPS
frontend balancer_http_in
    bind *:80
    redirect scheme https code 301 if ! { ssl_fc }

# Accept HTTPS traffic and forward to backend
frontend balancer_https_in
    bind *:443 ssl crt /etc/ssl/certs/ha_proxy_ssl.pem
    # Serves: tutoarchive.lancewreal.tech (13.220.156.66)
    option forwardfor
    default_backend balancer_http_out

# Round-robin between Web01 and Web02
backend balancer_http_out
    balance roundrobin
    server web-01 44.211.45.35:80 check
    server web-02 44.211.161.173:80 check
